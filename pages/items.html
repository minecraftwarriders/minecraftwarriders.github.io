<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Prices - Minecraft War Riders</title>
    
    <!-- Meta tags -->
    <meta property="og:title" content="Item Prices - Minecraft War Riders">
    <meta property="og:description" content="Complete item pricing guide for Minecraft War Riders server">
    <meta property="og:image" content="https://raw.githubusercontent.com/minecraftwarriders/minecraftwarriders.github.io/main/assets/logo.png">
    <meta property="og:url" content="https://minecraftwarriders.github.io/pages/items">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/minecraftwarriders/minecraftwarriders.github.io/main/assets/logo.png">
    
    <link rel="stylesheet" href="../assets/site.css">
    <link rel="stylesheet" href="../assets/desktop.css" media="(min-width: 781px)">
    <link rel="stylesheet" href="../assets/mobile.css" media="(max-width: 780px)">
    
    <!-- Utilities -->
    <script src="../assets/utils.js?v=7"></script>
    <script src="../assets/site.js" defer></script>
    
    <style>
        /* Items page specific styles */
        .items-hero h1 { margin: 0; font-size: 30px; letter-spacing: -0.02em; }
        .items-hero p { margin: 10px 0 0; color: var(--muted); font-size: 13px; max-width: 72ch; }
        .items-hero { display: grid; grid-template-columns: 1fr 260px; gap: 16px; align-items: center; }
        .items-hero .art img { width: 92%; height: auto; image-rendering: pixelated; }
        .items-hero .art { border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); background: radial-gradient(circle at 30% 30%, rgba(121,166,255,0.12), rgba(0,0,0,0)); display: grid; place-items: center; min-height: 170px; overflow: hidden; }

        .chip-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
        .chip { border:1px solid var(--border); background: rgba(255,255,255,0.03); color: var(--muted); padding:6px 10px; border-radius: var(--radius); font-size:12px; cursor:pointer; user-select:none; }
        .chip.active { color: var(--text); border-color: rgba(121,166,255,0.22); background: rgba(121,166,255,0.12); }

        .items-description {
            font-size: var(--text-lg);
            color: var(--primary-400);
            max-width: 600px;
            margin: 0 auto;
        }

        .controls-panel { margin-top: 14px; display:flex; gap:10px; flex-wrap:wrap; }
        .ctl { border:1px solid var(--border); background: rgba(255,255,255,0.03); padding:8px 10px; border-radius: var(--radius); color: var(--text); font: inherit; font-size: 13px; }
        .ctl select, .ctl input { border:none; outline:none; background:transparent; color:inherit; font:inherit; font-size:13px; }
        .ctl.search { flex:1; min-width: 260px; display:flex; align-items:center; gap:10px; }
        .ctl.search input { flex:1; }

        .search-container {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: var(--space-3);
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-500);
            font-size: 1.1em;
        }

        .search-input {
            width: 100%;
            padding: var(--space-3) var(--space-3) var(--space-3) var(--space-12);
            background: var(--dark-glass-bg);
            border: 1px solid var(--dark-glass-border);
            border-radius: var(--radius-lg);
            color: var(--primary-100);
            font-size: var(--text-base);
            transition: all var(--transition-fast);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-500);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .filter-select, .sort-select {
            padding: var(--space-3) var(--space-4);
            background: var(--dark-glass-bg);
            border: 1px solid var(--dark-glass-border);
            border-radius: var(--radius-lg);
            color: var(--primary-100);
            font-size: var(--text-sm);
            cursor: pointer;
            min-width: 150px;
        }

        .view-toggle {
            display: flex;
            background: var(--dark-glass-bg);
            border-radius: var(--radius-lg);
            padding: var(--space-1);
            border: 1px solid var(--dark-glass-border);
        }

        .view-toggle-btn {
            background: transparent;
            border: none;
            padding: var(--space-2) var(--space-3);
            color: var(--primary-400);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }

        .view-toggle-btn.active {
            background: var(--accent-500);
            color: white;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-4);
            padding: var(--space-3) 0;
            border-bottom: 1px solid var(--glass-border);
        }

        .items-count {
            color: var(--primary-400);
            font-size: var(--text-sm);
        }

        .loading-state {
            text-align: center;
            padding: var(--space-12);
            color: var(--primary-400);
        }

        .empty-state {
            text-align: center;
            padding: var(--space-12);
            color: var(--primary-400);
        }

        /* Grid View */
        .items-grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; margin-top: 14px; }
        .item-card { border:1px solid var(--border); background: rgba(255,255,255,0.03); border-radius: var(--radius); padding: 12px; }

        .item-card:hover { border-color: var(--border2); }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .item-header {
            display: flex;
            align-items: center;
            margin-bottom: var(--space-3);
        }

        .item-icon { width: 38px; height: 38px; border:1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02); border-radius: var(--radius); display:grid; place-items:center; margin-right: 10px; }

        .item-icon-img {
            width: 36px;
            height: 36px;
            image-rendering: pixelated;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--primary-100);
            margin-bottom: var(--space-1);
        }

        .item-category {
            font-size: var(--text-xs);
            color: var(--primary-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .item-pricing { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }

        .price-box { border:1px solid rgba(255,255,255,0.08); border-radius: var(--radius); padding: 10px; text-align:center; background: rgba(0,0,0,0.15); }

        .price-box.buy {
            border-color: rgba(16, 185, 129, 0.3);
        }

        .price-box.sell {
            border-color: rgba(245, 158, 11, 0.3);
        }

        .price-label {
            font-size: var(--text-xs);
            color: var(--primary-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--space-1);
        }

        .price-value {
            font-family: var(--font-mono);
            font-size: var(--text-base);
            font-weight: 600;
        }

        .price-box.buy .price-value { color: var(--ok); }

        .price-box.sell .price-value { color: var(--warn); }

        .price-unavailable {
            color: var(--primary-500);
        }

        /* List View */
        .items-table {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }

        .table-header {
            background: var(--dark-glass-bg);
            border-bottom: 1px solid var(--glass-border);
            padding: var(--space-4);
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 1fr;
            gap: var(--space-4);
            font-weight: 600;
            color: var(--primary-300);
            font-size: var(--text-sm);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-row {
            padding: var(--space-4);
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 1fr;
            gap: var(--space-4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all var(--transition-fast);
            align-items: center;
        }

        .table-row:hover {
            background: var(--dark-glass-bg);
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .table-item-info {
            display: flex;
            align-items: center;
        }

        .table-item-icon {
            width: 32px;
            height: 32px;
            background: var(--dark-glass-bg);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: var(--space-3);
            font-size: 1em;
        }

        .table-item-icon img {
            width: 22px;
            height: 22px;
            image-rendering: pixelated;
        }

        .table-item-details {
            flex: 1;
        }

        .table-item-name {
            font-size: var(--text-base);
            font-weight: 500;
            color: var(--primary-100);
            margin-bottom: var(--space-1);
        }

        .table-item-category {
            font-size: var(--text-xs);
            color: var(--primary-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .table-price {
            font-family: var(--font-mono);
            font-size: var(--text-base);
            font-weight: 600;
            text-align: center;
        }

        .table-price.buy {
            color: var(--success-400);
        }

        .table-price.sell {
            color: var(--warning-400);
        }

        .table-price.unavailable {
            color: var(--primary-500);
        }

        /* Special item indicators */
        .special-item {
            position: relative;
        }

        .special-item::after {
            content: 'Featured';
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 3px 6px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.42);
            color: var(--accent2);
            border-radius: 3px;
            font-size: 0.68em;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Category chips */
        .category-chip {
            display: inline-block;
            padding: var(--space-1) var(--space-2);
            background: var(--dark-glass-bg);
            border: 1px solid var(--dark-glass-border);
            border-radius: 3px;
            font-size: var(--text-xs);
            color: var(--primary-400);
            margin: var(--space-1);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .category-chip:hover, .category-chip.active {
            background: var(--accent-500);
            color: white;
            border-color: var(--accent-500);
        }

        .categories-filter {
            margin-bottom: var(--space-6);
        }

        .categories-title {
            font-size: var(--text-base);
            font-weight: 600;
            color: var(--primary-300);
            margin-bottom: var(--space-3);
        }

        /* Clean pass overrides: keep items simple and readable */
        .items-hero {
            display: block;
        }
        .items-hero h1 {
            font-size: clamp(34px, 5vw, 58px);
            line-height: 1;
            letter-spacing: -0.055em;
        }
        .items-hero p {
            max-width: 62ch;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.6;
        }
        .items-hero .art {
            display: none;
        }
        .controls-panel {
            align-items: stretch;
            margin-top: 22px;
        }
        .ctl {
            min-height: 44px;
            border-radius: 3px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.035);
        }
        .ctl select,
        .ctl input {
            min-height: 24px;
            color: var(--text);
        }
        .chip {
            border-radius: 3px;
            padding: 8px 11px;
            font-weight: 700;
        }
        .chip.active {
            border-color: rgba(215, 178, 90, 0.32);
            background: rgba(215, 178, 90, 0.12);
            color: var(--text);
        }
        .items-grid {
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }
        .item-card {
            border-radius: 4px;
            padding: 14px;
            background: rgba(255,255,255,0.035);
        }
        .item-card::before {
            display: none;
        }
        .item-header {
            margin-bottom: 12px;
        }
        .item-name {
            color: var(--text);
            font-size: 15px;
            font-weight: 800;
        }
        .item-category,
        .price-label,
        .items-count {
            color: var(--muted) !important;
        }
        .price-box {
            border-radius: 8px;
            background: rgba(0,0,0,0.16);
        }
    </style>
</head>
<body>
    <div class="app">
      <header class="topbar">
        <div class="topbar-left">
          <div class="badge">MC<br/>WR</div>
          <div style="font-weight:800;">War Riders</div>
        </div>
        <nav class="topnav" aria-label="Top">
          <a data-nav href="../index.html">Home</a>
          <a data-nav href="./wiki.html">Wiki</a>
          <a data-nav class="active" href="./items.html">Items</a>
          <a data-nav href="./store.html">Store</a>
        </nav>
        <div class="search" role="search">
          <span class="muted">Search</span>
          <input id="globalSearch" type="search" placeholder="Search items..." autocomplete="off" />
          <span class="kbd">Ctrl K</span>
        </div>
        <div class="topbar-right"><div class="avatar" aria-hidden="true"></div></div>
      </header>

      <div class="shell">
        <aside class="sidebar" aria-label="Sidebar">
          <div class="section-title">Items</div>
          <a class="side-link active" href="./items.html">Item Prices</a>
          <a class="side-link" href="./wiki.html#commands">Commands</a>
        </aside>

        <main class="content">
          <div class="crumbs"><a href="../index.html">Home</a> › <span>Items</span></div>

          <section class="hero-card">
            <div class="items-hero">
              <div>
                <h1>Item Prices</h1>
                <p>Complete pricing guide for all items available on the server. Search, filter, and compare prices easily.</p>
              </div>
              <div class="art"><img src="../assets/images/itemschestimage.png" alt="" /></div>
            </div>
            <div class="controls-panel">
              <div class="ctl search">
                <span style="color:var(--muted);">Search</span>
                <input type="search" id="searchInput" placeholder="Search items..." />
              </div>
              <div class="ctl">
                <select id="categoryFilter">
                  <option value="">All</option>
                  <option value="automation">Automation</option>
                  <option value="blocks">Blocks</option>
                  <option value="decoration">Decoration</option>
                  <option value="dyes">Dyes</option>
                  <option value="enchanting">Enchanting</option>
                  <option value="farming">Farming</option>
                  <option value="food">Food</option>
                  <option value="miscellaneous">Miscellaneous</option>
                  <option value="mobs">Mobs</option>
                  <option value="music">Music</option>
                  <option value="ores">Ores</option>
                  <option value="potions">Potions</option>
                  <option value="redstone">Redstone</option>
                  <option value="spawneggs">Spawn Eggs</option>
                  <option value="spawners">Spawners</option>
                  <option value="workstations">Workstations</option>
                  <option value="z_everythingelse">Everything Else</option>
                </select>
              </div>
              <div class="ctl">
                <select id="sortSelect">
                  <option value="name">Name A-Z</option>
                  <option value="buy-high">Buy high</option>
                  <option value="buy-low">Buy low</option>
                  <option value="sell-high">Sell high</option>
                  <option value="sell-low">Sell low</option>
                </select>
              </div>
            </div>

            <div class="chip-row" id="categoryChips"></div>
            <div class="items-count" id="itemsCount" style="margin-top:10px; color:var(--muted); font-size:12px;">Loading…</div>
          </section>

          <div class="items-grid" id="itemsGrid"></div>
          <div class="empty-state" id="emptyState" style="display:none; text-align:center; color:var(--muted); padding:18px;">No items found</div>
        </main>
      </div>
    </div>

    <script>
        // Item data loader instance
        const itemLoader = new ItemDataLoader();

        // State management
        let currentItems = [];
        let filteredItems = [];
        let currentView = 'grid';

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            loadItems();
            setupEventListeners();
            setupNavbar();
            setupTopSearch();
        });

        // Load and process items data
        async function loadItems() {
            try {
                // Show loading state
                showLoading(true);
                
                // Load items from YAML files
                currentItems = await itemLoader.loadAllItems();
                filteredItems = [...currentItems];
                
                renderItems();
                updateItemsCount();
                generateCategoryChips();
                
                showLoading(false);
                
                // Show success message
                if (window.toast) {
                    window.toast.show(`Loaded ${currentItems.length} items successfully!`, 'success', 3000);
                }
            } catch (error) {
                console.error('Error loading items:', error);
                showLoading(false);
                
                // Show error and use fallback data
                if (window.toast) {
                    window.toast.show('Failed to load item data. Using fallback data.', 'warning');
                }
                
                currentItems = itemLoader.getFallbackItems();
                filteredItems = [...currentItems];
                renderItems();
                updateItemsCount();
                generateCategoryChips();
            }
        }

        // Setup event listeners
        function setupEventListeners() {
            // Search input
            document.getElementById('searchInput').addEventListener('input', handleSearch);
            
            // Category filter
            document.getElementById('categoryFilter').addEventListener('change', handleFilter);
            
            // Sort select
            document.getElementById('sortSelect').addEventListener('change', handleSort);
            
            // No list view toggle in the new layout; keep grid only
        }

        // Handle search functionality
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (query === '') {
                filteredItems = [...currentItems];
            } else {
                filteredItems = currentItems.filter(item => 
                    item.name.toLowerCase().includes(query) ||
                    item.material.toLowerCase().includes(query) ||
                    item.category.toLowerCase().includes(query)
                );
            }
            
            renderItems();
            updateItemsCount();
        }

        // Wire topbar search to the page search input
        function setupTopSearch() {
            const top = document.getElementById('globalSearch');
            const main = document.getElementById('searchInput');
            if (!top || !main) return;
            top.addEventListener('input', () => {
                main.value = top.value;
                handleSearch();
            });
        }

        // Handle category filtering
        function handleFilter() {
            const category = document.getElementById('categoryFilter').value;
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            
            let items = [...currentItems];
            
            // Apply search filter
            if (searchQuery !== '') {
                items = items.filter(item => 
                    item.name.toLowerCase().includes(searchQuery) ||
                    item.material.toLowerCase().includes(searchQuery)
                );
            }
            
            // Apply category filter
            if (category !== '') {
                items = items.filter(item => item.category === category);
            }
            
            filteredItems = items;
            renderItems();
            updateItemsCount();
        }

        // Handle sorting
        function handleSort() {
            const sortBy = document.getElementById('sortSelect').value;
            
            switch (sortBy) {
                case 'name':
                    filteredItems.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'buy-high':
                    filteredItems.sort((a, b) => (b.buy === -1 ? -1 : b.buy) - (a.buy === -1 ? -1 : a.buy));
                    break;
                case 'buy-low':
                    filteredItems.sort((a, b) => (a.buy === -1 ? Infinity : a.buy) - (b.buy === -1 ? Infinity : b.buy));
                    break;
                case 'sell-high':
                    filteredItems.sort((a, b) => (b.sell === -1 ? -1 : b.sell) - (a.sell === -1 ? -1 : a.sell));
                    break;
                case 'sell-low':
                    filteredItems.sort((a, b) => (a.sell === -1 ? Infinity : a.sell) - (b.sell === -1 ? Infinity : b.sell));
                    break;
            }
            
            renderItems();
        }

        // Set view mode (grid or list)
        function setView(view) {
            currentView = 'grid';
            renderItems();
        }

        // Render items based on current view
        function renderItems() {
            if (filteredItems.length === 0) {
                showEmptyState(true);
                return;
            }
            
            showEmptyState(false);
            
            renderGridView();
        }

        // Render grid view
        function renderGridView() {
            const container = document.getElementById('itemsGrid');
            container.innerHTML = '';
            
            filteredItems.forEach(item => {
                const card = document.createElement('div');
                card.className = `item-card ${item.special ? 'special-item' : ''}`;
                
                const iconUrls = Array.isArray(item.iconUrls) ? item.iconUrls : [];
                const iconHtml = iconUrls.length
                    ? `<img class="item-icon-img" alt="${item.material} icon" loading="lazy" decoding="async" data-icon material="${item.material}" src="${iconUrls[0]}">`
                    : '<span class="item-icon-fallback">Item</span>';

                card.innerHTML = `
                    <div class="item-header">
                        <div class="item-icon">${iconHtml}</div>
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-category">${item.category}</div>
                        </div>
                    </div>
                    <div class="item-pricing">
                        <div class="price-box buy">
                            <div class="price-label">Buy Price</div>
                            <div class="price-value ${item.buy === -1 ? 'price-unavailable' : ''}">
                                ${item.buy === -1 ? 'N/A' : '$' + item.buy.toLocaleString()}
                            </div>
                        </div>
                        <div class="price-box sell">
                            <div class="price-label">Sell Price</div>
                            <div class="price-value ${item.sell === -1 ? 'price-unavailable' : ''}">
                                ${item.sell === -1 ? 'N/A' : '$' + item.sell.toLocaleString()}
                            </div>
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });

            wireUpIconFallback(container);
        }

        // Render list view
        // List view removed in the new layout

        function wireUpIconFallback(rootEl) {
            const imgs = rootEl.querySelectorAll('img[data-icon][material]');
            imgs.forEach(img => {
                const material = img.getAttribute('material');
                const urlList = (itemLoader.getItemIconUrls(material) || []);
                let idx = 0;
                const tryNext = () => {
                    idx += 1;
                    if (idx >= urlList.length) return;
                    img.src = urlList[idx];
                };
                img.addEventListener('error', tryNext, { once: false });
            });
        }

        // Update items count display
        function updateItemsCount() {
            const count = filteredItems.length;
            const total = currentItems.length;
            document.getElementById('itemsCount').textContent = 
                `Showing ${count} of ${total} items`;
        }

        // Generate category filter chips
        function generateCategoryChips() {
            const categories = [...new Set(currentItems.map(item => item.category))];
            const container = document.getElementById('categoryChips');
            if (!container) return;
            container.innerHTML = '';

            const addChip = (label, value) => {
                const chip = document.createElement('span');
                chip.className = 'chip' + (document.getElementById('categoryFilter').value === value ? ' active' : '');
                chip.textContent = label;
                chip.addEventListener('click', () => {
                    document.getElementById('categoryFilter').value = value;
                    handleFilter();
                    generateCategoryChips();
                });
                container.appendChild(chip);
            };

            addChip('All', '');
            categories.forEach(category => addChip(category, category));
        }

        // Show/hide loading state
        function showLoading(show) {
            // Loading state is intentionally static in the new layout.
        }

        // Show/hide empty state
        function showEmptyState(show) {
            document.getElementById('emptyState').style.display = show ? 'block' : 'none';
        }

        // Navbar scroll effect
        function setupNavbar() {
            function handleNavbarScroll() {
                const navbar = document.getElementById('navbar');
                if (window.scrollY > 100) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            }
            
            window.addEventListener('scroll', handleNavbarScroll);
        }
    </script>
</body>
</html>
